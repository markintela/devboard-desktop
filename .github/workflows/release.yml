name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run typecheck

      - run: npm run build:win

      - uses: softprops/action-gh-release@v2
        with:
          name: DevBoard
          files: release/*.exe
          generate_release_notes: true
